<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المسوق — مفروشاتي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2130;
  --tx:#e6edf3;--mt:#8b949e;--bd:#30363d;
  --gold:#c9a96e;--gold-dim:rgba(201,169,110,.12);
  --green:#3fb950;--green-dim:rgba(63,185,80,.12);
  --red:#f85149;--red-dim:rgba(248,81,73,.12);
  --blue:#58a6ff;--blue-dim:rgba(88,166,255,.12);
  --yellow:#e3b341;--yellow-dim:rgba(227,179,65,.12);
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;direction:rtl}

/* ===== LOGIN ===== */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px}
.login-card{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:36px 28px;width:min(380px,100%);text-align:center}
.login-logo{width:60px;height:60px;background:var(--gold);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#0d1117;margin:0 auto 14px}
.login-title{font-size:20px;font-weight:900;color:var(--tx);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--mt);margin-bottom:28px}
.login-input{width:100%;padding:13px 16px;border-radius:10px;border:1.5px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:15px;font-family:'Tajawal',sans-serif;direction:ltr;text-align:center;outline:none;transition:border-color .2s;margin-bottom:10px}
.login-input:focus{border-color:var(--gold)}
.login-hint{font-size:11px;color:var(--mt);margin-bottom:16px}
.login-btn{width:100%;padding:13px;border-radius:10px;background:var(--gold);color:#0d1117;font-size:15px;font-weight:800;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-err{color:var(--red);font-size:12px;min-height:18px;margin-bottom:10px}

/* ===== SUSPENDED ===== */
#suspendedScreen{display:none;position:fixed;inset:0;background:var(--bg);z-index:8000;align-items:center;justify-content:center;padding:16px;text-align:center}
.suspended-card{background:var(--bg2);border:1px solid var(--red);border-radius:20px;padding:40px 28px;width:min(380px,100%)}

/* ===== HEADER ===== */
.header{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:10px}
.header-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.header-avatar-placeholder{width:34px;height:34px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#0d1117}
.header-name{font-size:14px;font-weight:800;color:var(--tx)}
.header-sub{font-size:11px;color:var(--mt)}
.header-acts{display:flex;align-items:center;gap:8px}
.btn-logout{background:none;border:1px solid var(--bd);color:var(--mt);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Tajawal',sans-serif}
.btn-logout:hover{color:var(--red);border-color:var(--red)}

/* ===== NAV ===== */
.bottom-nav{position:fixed;bottom:0;right:0;left:0;background:var(--bg2);border-top:1px solid var(--bd);display:flex;z-index:100}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 14px;cursor:pointer;color:var(--mt);font-size:10px;font-weight:700;gap:3px;transition:color .2s;border:none;background:none;font-family:'Tajawal',sans-serif}
.nav-tab.on{color:var(--gold)}
.nav-tab-icon{font-size:20px}

/* ===== MAIN ===== */
main{padding:16px 16px 90px}

/* ===== STATS ===== */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--mt);margin-bottom:4px;font-weight:600}
.stat-val{font-size:22px;font-weight:900;color:var(--tx)}
.stat-sub{font-size:11px;color:var(--mt);margin-top:2px}
.stat-card.gold{border-color:rgba(201,169,110,.3);background:var(--gold-dim)}
.stat-card.green{border-color:rgba(63,185,80,.3);background:var(--green-dim)}
.stat-card.blue{border-color:rgba(88,166,255,.3);background:var(--blue-dim)}

/* ===== SUB CARD ===== */
.sub-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sub-card.expired{border-color:var(--red);background:var(--red-dim)}
.sub-card.ok{border-color:rgba(63,185,80,.4);background:var(--green-dim)}
.sub-label{font-size:12px;color:var(--mt);margin-bottom:2px}
.sub-date{font-size:15px;font-weight:800}
.sub-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.sub-status.ok{background:var(--green-dim);color:var(--green)}
.sub-status.expired{background:var(--red-dim);color:var(--red)}

/* ===== SHARE CARD ===== */
.share-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.share-title{font-size:12px;color:var(--mt);margin-bottom:8px;font-weight:700}
.share-url{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--blue);direction:ltr;word-break:break-all;margin-bottom:10px;cursor:pointer}
.share-btns{display:flex;gap:8px}
.share-btn{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:800;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px}
.share-btn.copy{background:var(--bg3);color:var(--tx);border:1px solid var(--bd)}
.share-btn.wa{background:linear-gradient(135deg,#25d366,#1aab54);color:#fff}

/* ===== SECTION ===== */
.section-title{font-size:14px;font-weight:800;color:var(--tx);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.count-badge{background:var(--bg3);color:var(--mt);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}

/* ===== ORDER CARD ===== */
.order-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.order-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.order-id{font-size:11px;color:var(--mt);font-family:monospace}
.order-date{font-size:11px;color:var(--mt)}
.order-items{border-top:1px solid var(--bd);padding-top:10px;margin-bottom:10px}
.order-item-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px dashed var(--bd)}
.order-item-row:last-child{border:none}
.order-item-name{font-size:12px;font-weight:700;color:var(--tx)}
.order-item-detail{font-size:11px;color:var(--mt);margin-top:2px}
.order-item-price{font-size:12px;font-weight:800;color:var(--gold);white-space:nowrap}
.order-ft{display:flex;align-items:center;justify-content:space-between}
.order-total{font-size:13px;font-weight:800;color:var(--tx)}
.order-comm{font-size:11px;color:var(--green);font-weight:700}
.order-actions{display:flex;gap:6px;margin-top:10px}
.act-btn{flex:1;padding:8px;border-radius:8px;font-size:11px;font-weight:800;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;transition:opacity .2s}
.act-btn:hover{opacity:.8}
.act-confirm{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(88,166,255,.3)}
.act-deliver{background:var(--green-dim);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.act-cancel{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,81,73,.3)}

/* ===== BADGE ===== */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800}
.badge-new{background:var(--yellow-dim);color:var(--yellow)}
.badge-confirmed{background:var(--blue-dim);color:var(--blue)}
.badge-delivered{background:var(--green-dim);color:var(--green)}
.badge-cancelled{background:var(--red-dim);color:var(--red)}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:40px 16px;color:var(--mt);font-size:13px}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--bd);color:var(--tx);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;box-shadow:var(--shadow);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== FILTER TABS ===== */
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.filter-tab{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--bd);background:none;color:var(--mt);cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap}
.filter-tab.on{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">م</div>
    <div class="login-title">لوحة المسوق</div>
    <div class="login-sub">سجل دخولك برقم واتساب المسجل في المنصة</div>
    <input class="login-input" id="loginWa" type="tel" placeholder="مثال: 96512345678" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-hint">أدخل الرقم بالصيغة الدولية بدون + أو مسافات</div>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" onclick="doLogin()">دخول ←</button>
  </div>
</div>

<!-- SUSPENDED -->
<div id="suspendedScreen">
  <div class="suspended-card">
    <div style="font-size:48px;margin-bottom:16px">⏸</div>
    <div style="font-size:18px;font-weight:900;color:var(--red);margin-bottom:8px">المتجر موقوف مؤقتاً</div>
    <div style="font-size:13px;color:var(--mt);line-height:1.7;margin-bottom:20px">تواصل مع إدارة مفروشاتي لتجديد اشتراكك وإعادة تفعيل متجرك</div>
    <a id="suspendedWa" href="#" target="_blank" style="display:inline-block;padding:12px 24px;background:linear-gradient(135deg,#25d366,#1aab54);color:#fff;border-radius:10px;font-size:13px;font-weight:800;text-decoration:none">تواصل على واتساب</a>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header class="header">
    <div class="header-logo">
      <div id="hdrAvatar" class="header-avatar-placeholder">م</div>
      <div>
        <div class="header-name" id="hdrName">—</div>
        <div class="header-sub" id="hdrSub">مفروشاتي</div>
      </div>
    </div>
    <div class="header-acts">
      <button class="btn-logout" onclick="doLogout()">خروج 🚪</button>
    </div>
  </header>

  <main id="mainContent"></main>

  <nav class="bottom-nav">
    <button class="nav-tab on" onclick="goTab('overview',this)" id="tab-overview">
      <span class="nav-tab-icon">📊</span>نظرة عامة
    </button>
    <button class="nav-tab" onclick="goTab('orders',this)" id="tab-orders">
      <span class="nav-tab-icon">📦</span>طلباتي
    </button>
    <button class="nav-tab" onclick="goTab('earnings',this)" id="tab-earnings">
      <span class="nav-tab-icon">💰</span>أرباحي
    </button>
    <button class="nav-tab" onclick="goTab('store',this)" id="tab-store">
      <span class="nav-tab-icon">🔗</span>متجري
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
const FB={apiKey:"AIzaSyDz2PtMjNm4HlBCjS4GzuBdrVNdnMXhRNQ",authDomain:"mafroshaty.firebaseapp.com",databaseURL:"https://mafroshaty-default-rtdb.firebaseio.com",projectId:"mafroshaty",storageBucket:"mafroshaty.firebasestorage.app",messagingSenderId:"933051451932",appId:"1:933051451932:web:f694fa37b7548e0b746dd9"};
firebase.initializeApp(FB);
const db=firebase.database();

const MKT_KEY='maf_mkt_id';
let currentMarketer=null, allOrders={}, allProducts={}, allBrands={}, currentTab='overview', orderFilter='all';

// ===== LOGIN =====
function doLogin(){
  const wa=document.getElementById('loginWa').value.trim().replace(/\s+/g,'').replace(/^\+/,'');
  if(!wa||wa.length<8){showLoginErr('أدخل رقم واتساب صحيح');return;}
  document.getElementById('loginErr').textContent='⏳ جاري التحقق...';
  db.ref('marketers').once('value',snap=>{
    const all=snap.val()||{};
    const keys=Object.keys(all);
    if(keys.length===0){showLoginErr('لا يوجد مسوقين في قاعدة البيانات');return;}
    const found=Object.entries(all).find(([k,v])=>{
      const stored=String(v.waNumber||'').trim().replace(/^\+/,'');
      return stored===wa;
    });
    if(!found){
      // debug: نعرض أول رقم موجود عشان نعرف الفرق
      const sample=Object.values(all)[0]?.waNumber||'—';
      showLoginErr(`الرقم غير مسجل. مثال على رقم مسجل: ${sample}`);
      return;
    }
    const [id,mkt]=found;
    localStorage.setItem(MKT_KEY,id);
    startApp(id,mkt);
  }).catch(e=>showLoginErr('خطأ في الاتصال: '+e.message));
}
function showLoginErr(msg){document.getElementById('loginErr').textContent=msg;}
function doLogout(){
  localStorage.removeItem(MKT_KEY);
  location.reload();
}

// ===== START APP =====
function startApp(id, mkt){
  currentMarketer={...mkt,id};
  document.getElementById('loginScreen').style.display='none';

  // تحقق من الاشتراك والحالة
  if(mkt.storeActive===false){
    const ws=document.getElementById('suspendedScreen');
    ws.style.display='flex';
    document.getElementById('suspendedWa').href='https://wa.me/96500000000?text=أريد تجديد اشتراك متجري على مفروشاتي';
    return;
  }

  // تحديث Header
  document.getElementById('hdrName').textContent=mkt.name||'المسوق';
  document.getElementById('hdrSub').textContent=mkt.slug?mkt.slug+'.mafroshatي.com':'مفروشاتي';
  if(mkt.logo){
    const av=document.getElementById('hdrAvatar');
    av.outerHTML=`<img class="header-avatar" id="hdrAvatar" src="${mkt.logo}" onerror="this.style.display='none'">`;
  }

  document.getElementById('app').style.display='block';

  // listeners
  db.ref('orders').on('value',snap=>{
    const all=snap.val()||{};
    // فلترة طلبات هذا المسوق فقط
    const mine={};
    Object.entries(all).forEach(([k,v])=>{
      if(v.marketer_id===id)mine[k]=v;
    });
    allOrders=mine;
    if(currentTab==='orders'||currentTab==='overview'||currentTab==='earnings')renderTab();
  });
  db.ref('products').on('value',snap=>{
    allProducts=snap.val()||{};
  });
  db.ref('brands').on('value',snap=>{
    allBrands=snap.val()||{};
  });

  renderTab();
}

// ===== TABS =====
function goTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
  if(el)el.classList.add('on');
  renderTab();
}
function renderTab(){
  const c=document.getElementById('mainContent');
  if(currentTab==='overview')c.innerHTML=renderOverview();
  else if(currentTab==='orders')c.innerHTML=renderOrders();
  else if(currentTab==='earnings')c.innerHTML=renderEarnings();
  else if(currentTab==='store')c.innerHTML=renderStore();
}

// ===== HELPERS =====
function ordersArr(){return Object.entries(allOrders).map(([k,v])=>({...v,id:k})).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));}
function resolveItemBrand(item){
  if(item.brandAr||item.brandEn)return item.brandAr||item.brandEn;
  const p=Object.values(allProducts||{}).find(p=>p.nameAr===item.product||p.nameEn===item.product);
  if(!p)return'';
  const b=allBrands[p.brand_id||p.brand];
  return b?b.ar||b.en||'':'';
}
function xe(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function statusBadge(s){
  if(s==='new')return'<span class="badge badge-new">جديد</span>';
  if(s==='confirmed')return'<span class="badge badge-confirmed">مؤكد</span>';
  if(s==='delivered')return'<span class="badge badge-delivered">مسلّم</span>';
  return'<span class="badge badge-cancelled">ملغي</span>';
}
function calcComm(order){
  const items=order.items||[];
  let total=0;
  items.forEach(item=>{
    // نبحث عن العمولة في المنتج
    const prod=Object.values(allProducts).find(p=>(p.nameAr===item.product||p.nameEn===item.productEn));
    const comm=prod?.commission||0;
    total+=comm*(item.qty||1);
  });
  return total;
}

// ===== OVERVIEW =====
function renderOverview(){
  const oa=ordersArr();
  const newO=oa.filter(o=>o.status==='new').length;
  const deliveredO=oa.filter(o=>o.status==='delivered');
  const totalComm=deliveredO.reduce((s,o)=>s+calcComm(o),0);
  const pendingComm=oa.filter(o=>o.status==='confirmed').reduce((s,o)=>s+calcComm(o),0);
  const m=currentMarketer;
  const subExpiry=m.subExpiry?new Date(m.subExpiry):null;
  const subOk=subExpiry&&subExpiry>new Date();
  const subDays=subExpiry?Math.ceil((subExpiry-new Date())/(1000*60*60*24)):0;

  return`
  ${subExpiry?`<div class="sub-card ${subOk?'ok':'expired'}" style="margin-bottom:14px">
    <div>
      <div class="sub-label">الاشتراك الشهري</div>
      <div class="sub-date" style="color:${subOk?'var(--green)':'var(--red)'}">${m.subExpiry}</div>
      <div style="font-size:11px;color:var(--mt);margin-top:2px">${subOk?`متبقي ${subDays} يوم`:'انتهى الاشتراك'}</div>
    </div>
    <span class="sub-status ${subOk?'ok':'expired'}">${subOk?'✅ سارٍ':'⚠️ منتهي'}</span>
  </div>`:''}
  <div class="stats-grid">
    <div class="stat-card gold">
      <div class="stat-label">إجمالي أرباحي</div>
      <div class="stat-val">${totalComm.toFixed(2)}</div>
      <div class="stat-sub">KWD من الطلبات المسلّمة</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">أرباح قيد التسليم</div>
      <div class="stat-val">${pendingComm.toFixed(2)}</div>
      <div class="stat-sub">KWD من طلبات مؤكدة</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">طلبات جديدة</div>
      <div class="stat-val">${newO}</div>
      <div class="stat-sub">تحتاج متابعة</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">إجمالي طلباتي</div>
      <div class="stat-val">${oa.length}</div>
      <div class="stat-sub">منذ البداية</div>
    </div>
  </div>
  ${newO>0?`
  <div class="section-title">🔔 طلبات جديدة تحتاج تأكيد</div>
  ${oa.filter(o=>o.status==='new').slice(0,3).map((o,i)=>orderCard(o,oa.length-i)).join('')}
  ${newO>3?`<div style="text-align:center;padding:8px;font-size:12px;color:var(--blue);cursor:pointer" onclick="goTab('orders',document.getElementById('tab-orders'))">عرض كل الطلبات ←</div>`:''}
  `:'<div class="empty">🎉 لا يوجد طلبات جديدة الآن</div>'}`;
}

// ===== ORDERS =====
function renderOrders(){
  const oa=ordersArr();
  const filters=[
    {id:'all',label:'الكل'},
    {id:'new',label:'جديد'},
    {id:'confirmed',label:'مؤكد'},
    {id:'delivered',label:'مسلّم'},
    {id:'cancelled',label:'ملغي'},
  ];
  const filtered=orderFilter==='all'?oa:oa.filter(o=>o.status===orderFilter);
  return`
  <div class="filter-tabs">
    ${filters.map(f=>`<button class="filter-tab${orderFilter===f.id?' on':''}" onclick="setFilter('${f.id}')">${f.label}</button>`).join('')}
  </div>
  <div class="section-title">📦 طلباتي <span class="count-badge">${filtered.length}</span></div>
  ${filtered.length?filtered.map((o,i)=>orderCard(o,oa.length-oa.indexOf(o))).join(''):'<div class="empty">لا توجد طلبات في هذه الفئة</div>'}`;
}
function setFilter(f){orderFilter=f;renderTab();}

function orderCard(o,orderNum){
  const items=o.items?Object.values(o.items):[];
  const canConfirm=o.status==='new';
  const canDeliver=o.status==='confirmed';
  const canCancel=o.status==='new'||o.status==='confirmed';
  const groups={};
  items.forEach(item=>{
    const bk=resolveItemBrand(item)||'غير محدد';
    if(!groups[bk])groups[bk]=[];
    groups[bk].push(item);
  });
  return`<div class="order-card">
    <div class="order-hd">
      <span style="background:var(--bg3);color:var(--tx);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;font-family:inherit">طلب #${orderNum||'—'}</span>
      <div style="display:flex;align-items:center;gap:6px">
        ${statusBadge(o.status)}
        <span class="order-date">${xe(o.date||'')}</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;margin:10px 0">
      ${Object.entries(groups).map(([brand,gitems])=>`
        <div style="border:1px solid var(--bd);border-radius:8px;overflow:hidden">
          <div style="background:var(--bg3);padding:5px 10px;font-size:11px;font-weight:800;color:var(--gold)">🏢 ${xe(brand)}</div>
          ${gitems.map(item=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-top:1px solid var(--bd)">
              <div>
                <div style="font-size:13px;font-weight:600;color:var(--tx)">${xe(item.product||item.nameAr||'')}</div>
                <div style="font-size:11px;color:var(--mt)">${xe(item.color||item.colorAr||'')}${item.size?' · '+xe(item.size):''} × ${item.qty||1}</div>
              </div>
              <span style="color:var(--gold);font-size:13px;font-weight:700">${item.price*(item.qty||1)} KWD</span>
            </div>`).join('')}
        </div>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--bd)">
      <div class="order-total">الإجمالي: ${xe(o.total||0)} KWD</div>
    </div>
    ${canConfirm||canDeliver||canCancel?`<div class="order-actions">
      ${canConfirm?`<button class="act-btn act-confirm" onclick="updateOrder('${o.id}','confirmed')">✓ تأكيد</button>`:''}
      ${canDeliver?`<button class="act-btn act-deliver" onclick="updateOrder('${o.id}','delivered')">🚚 مسلّم</button>`:''}
      ${canCancel?`<button class="act-btn act-cancel" onclick="updateOrder('${o.id}','cancelled')">✕ إلغاء</button>`:''}
    </div>`:''}
  </div>`;
}
function updateOrder(id,status){
  db.ref('orders/'+id).update({status}).then(()=>{
    const labels={confirmed:'✓ تم التأكيد',delivered:'🚚 تم التسليم',cancelled:'تم الإلغاء'};
    toast(labels[status]||'تم التحديث');
  }).catch(e=>toast('خطأ: '+e.message,false));
}

// ===== EARNINGS =====
function renderEarnings(){
  const oa=ordersArr();
  const delivered=oa.filter(o=>o.status==='delivered');
  const confirmed=oa.filter(o=>o.status==='confirmed');
  const totalDelivered=delivered.reduce((s,o)=>s+(o.total||0),0);
  const totalPending=confirmed.reduce((s,o)=>s+(o.total||0),0);
  const thisMonth=delivered.filter(o=>{
    const d=new Date(o.date||0);const n=new Date();
    return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();
  }).reduce((s,o)=>s+(o.total||0),0);
  return`
  <div class="section-title">💰 ملخص المبيعات</div>
  <div class="stats-grid" style="margin-bottom:16px">
    <div class="stat-card gold">
      <div class="stat-label">إجمالي المبيعات المسلّمة</div>
      <div class="stat-val">${totalDelivered.toFixed(2)}</div>
      <div class="stat-sub">KWD</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">مبيعات هذا الشهر</div>
      <div class="stat-val">${thisMonth.toFixed(2)}</div>
      <div class="stat-sub">KWD</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">قيد التسليم</div>
      <div class="stat-val">${totalPending.toFixed(2)}</div>
      <div class="stat-sub">KWD — طلبات مؤكدة</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">طلبات مسلّمة</div>
      <div class="stat-val">${delivered.length}</div>
      <div class="stat-sub">طلب</div>
    </div>
  </div>
  <div class="section-title">📋 الطلبات المسلّمة <span class="count-badge">${delivered.length}</span></div>
  ${delivered.length?delivered.map((o,i)=>orderCard(o,oa.length-oa.indexOf(o))).join(''):'<div class="empty">لا توجد طلبات مسلّمة بعد</div>'}`;
}
function renderStore(){
  const m=currentMarketer;
  const storeUrl=`https://${m.slug}.mafroshatي.com`;
  return`
  <div class="section-title">🔗 رابط متجري</div>
  <div class="share-card">
    <div class="share-url" onclick="copyUrl('${storeUrl}')">${storeUrl}</div>
    <div class="share-btns">
      <button class="share-btn copy" onclick="copyUrl('${storeUrl}')">📋 نسخ الرابط</button>
      <button class="share-btn wa" onclick="shareOnWa('${storeUrl}')">📲 مشاركة واتساب</button>
    </div>
  </div>

  <div class="section-title" style="margin-top:6px">🎨 تخصيص المتجر</div>
  <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:16px">
    <div style="margin-bottom:14px">
      <label style="font-size:12px;color:var(--mt);display:block;margin-bottom:6px;font-weight:700">🖼️ لوجو المتجر</label>
      <div style="display:flex;align-items:center;gap:12px">
        <div id="cust-logo-prev" style="width:56px;height:56px;border-radius:50%;border:2px solid var(--bd);background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">
          ${m.logo?`<img src="${m.logo}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:'\U0001f464'}
        </div>
        <div style="flex:1">
          <input id="cust-logo-url" class="login-input" style="margin-bottom:6px;font-size:12px;padding:8px 12px;text-align:right;direction:rtl" placeholder="رابط اللوجو (URL)" value="${xe(m.logo||'')}" oninput="previewCustImg('cust-logo-url','cust-logo-prev',true)">
          <button onclick="document.getElementById('cust-logo-file').click()" style="padding:6px 12px;border-radius:7px;background:var(--bg3);border:1px dashed var(--bd);color:var(--mt);font-size:11px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif">📁 رفع صورة</button>
          <input type="file" id="cust-logo-file" accept="image/*" style="display:none" onchange="loadCustImg(this,'cust-logo-url','cust-logo-prev',true)">
        </div>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:12px;color:var(--mt);display:block;margin-bottom:6px;font-weight:700">🖼️ بانر المتجر <span style="font-size:10px;color:var(--mt)">(1500×500px)</span></label>
      <div id="cust-banner-prev" style="width:100%;height:80px;border-radius:8px;border:1.5px solid var(--bd);background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--mt);margin-bottom:8px">
        ${m.banner?`<img src="${m.banner}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:'لا يوجد بانر'}
      </div>
      <input id="cust-banner-url" class="login-input" style="margin-bottom:6px;font-size:12px;padding:8px 12px;text-align:right;direction:rtl" placeholder="رابط البانر (URL)" value="${xe(m.banner||'')}" oninput="previewCustImg('cust-banner-url','cust-banner-prev',false)">
      <button onclick="document.getElementById('cust-banner-file').click()" style="padding:6px 12px;border-radius:7px;background:var(--bg3);border:1px dashed var(--bd);color:var(--mt);font-size:11px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif">📁 رفع بانر</button>
      <input type="file" id="cust-banner-file" accept="image/*" style="display:none" onchange="loadCustImg(this,'cust-banner-url','cust-banner-prev',false)">
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:12px;color:var(--mt);display:block;margin-bottom:6px;font-weight:700">💬 رسالة ترحيب</label>
      <input id="cust-welcome" class="login-input" style="font-size:13px;padding:10px 12px;text-align:right;direction:rtl" placeholder="مرحباً بك في متجري" value="${xe(m.welcomeAr||'')}">
    </div>
    <button onclick="saveCust()" style="width:100%;padding:11px;border-radius:10px;background:var(--gold);color:#0d1117;font-size:14px;font-weight:800;border:none;cursor:pointer;font-family:'Tajawal',sans-serif">💾 حفظ التعديلات</button>
  </div>`;
}
function previewCustImg(inputId,prevId,circle){
  const url=document.getElementById(inputId)?.value.trim();
  const el=document.getElementById(prevId);
  if(!el)return;
  el.innerHTML=url?`<img src="${url}" style="width:100%;height:100%;object-fit:cover">`:(circle?'\U0001f464':'لا يوجد بانر');
}
function loadCustImg(inp,urlId,prevId,circle){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{document.getElementById(urlId).value=e.target.result;previewCustImg(urlId,prevId,circle);};
  r.readAsDataURL(f);
}
function saveCust(){
  const logo=document.getElementById('cust-logo-url').value.trim();
  const banner=document.getElementById('cust-banner-url').value.trim();
  const welcomeAr=document.getElementById('cust-welcome').value.trim();
  db.ref('marketers/'+currentMarketer.id).update({logo,banner,welcomeAr})
    .then(()=>{
      currentMarketer={...currentMarketer,logo,banner,welcomeAr};
      const av=document.getElementById('hdrAvatar');
      if(av&&logo)av.src=logo;
      toast('\u2705 تم حفظ التعديلات');
    })
    .catch(e=>toast('خطأ: '+e.message));
}
function copyUrl(url){
  navigator.clipboard.writeText(url).then(()=>toast('✓ تم النسخ')).catch(()=>{
    const t=document.createElement('textarea');
    t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
    toast('✓ تم النسخ');
  });
}
function shareOnWa(url){
  window.open('https://wa.me/?text='+encodeURIComponent('🛋️ تسوق من متجري على مفروشاتي:\n'+url),'_blank');
}

// ===== TOAST =====
let _toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

// ===== INIT =====
const savedId=localStorage.getItem(MKT_KEY);
if(savedId){
  db.ref('marketers/'+savedId).once('value',snap=>{
    const mkt=snap.val();
    if(mkt)startApp(savedId,mkt);
    else{localStorage.removeItem(MKT_KEY);}
  });
}
</script>
</body>
</html>
